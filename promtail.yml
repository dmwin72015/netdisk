server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: netdisk
    static_configs:
      - targets: [localhost]
        labels:
          job: netdisk
          __path__: /var/log/netdisk/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            time: time
            message: message
      - labels:
          level:
      - timestamp:
          source: time
          format: UnixMs
