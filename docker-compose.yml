services:
  frontend:
    build:
      context: ./frontend
    image: netdisk-frontend:local
    container_name: netdisk_frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - PORT=8090
      - HOST=0.0.0.0
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    image: netdisk-backend:local
    container_name: netdisk_backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - netdiskdata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  migrate:
    image: migrate/migrate:latest
    container_name: netdisk_migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/internal/db/migrations:/migrations:ro
    command:
      [
        "-path=/migrations",
        "-database=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-root1234}@postgres:5432/${POSTGRES_DB:-netdisk}?sslmode=disable",
        "up"
      ]
    restart: "no"

  postgres:
    image: postgres:16-alpine
    container_name: netdisk_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root1234}
      POSTGRES_DB: ${POSTGRES_DB:-netdisk}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: netdisk_redis
    ports:
      - "${REDIS_PORT:-16379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    container_name: netdisk_nginx
    depends_on:
      - frontend
      - backend
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  netdiskdata:
