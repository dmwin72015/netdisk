<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="512" height="512">
      <!-- Soft background circle -->
      <circle cx="100" cy="100" r="85" fill="#F5F7FA"/>

      <!-- Open box (3D perspective) -->
      <!-- Box back -->
      <path d="M60 80 L100 65 L140 80 L140 130 L100 145 L60 130 Z"
        fill="white" stroke="#8A99A8" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- Box front face -->
      <path d="M60 80 L100 95 L140 80" fill="none" stroke="#8A99A8" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
      <!-- Box left face -->
      <path d="M60 80 L60 130 L100 145 L100 95" fill="none" stroke="#C0C8D0" stroke-width="2" stroke-linejoin="round"/>
      <!-- Box bottom interior -->
      <path d="M100 95 L100 145 L140 130 L140 80" fill="#F5F7FA" stroke="#8A99A8" stroke-width="2" stroke-linejoin="round"/>

      <!-- Empty interior - nothing inside, just a subtle dashed circle -->
      <circle cx="100" cy="105" r="15" fill="none" stroke="#DDE3EA" stroke-width="1.5" stroke-dasharray="3 3"/>
      <!-- Small dash inside -->
      <path d="M94 105 L106 105" stroke="#DDE3EA" stroke-width="2" stroke-linecap="round"/>

      <!-- Floating elements above box (things that could be in the box, drifting away) -->
      <!-- Small document -->
      <rect x="78" y="35" width="14" height="18" rx="2" fill="white" stroke="#C0C8D0" stroke-width="2"/>
      <path d="M81 40 L89 40 M81 44 L89 44 M81 48 L87 48" stroke="#E8ECF0" stroke-width="1.5" stroke-linecap="round"/>

      <!-- Small image frame -->
      <rect x="108" y="30" width="16" height="14" rx="2" fill="white" stroke="#C0C8D0" stroke-width="2"/>
      <circle cx="113" cy="35" r="2" fill="#DDE3EA"/>
      <path d="M110 42 L114 38 L118 41 L122 36 L124 42" stroke="#DDE3EA" stroke-width="1.5" fill="none" stroke-linejoin="round"/>

      <!-- Dotted lines suggesting items floating away -->
      <path d="M100 55 C95 50 90 48 82 45" fill="none" stroke="#DDE3EA" stroke-width="1.5" stroke-dasharray="2 3"/>
      <path d="M100 55 C105 50 110 48 118 44" fill="none" stroke="#DDE3EA" stroke-width="1.5" stroke-dasharray="2 3"/>

      <!-- Small dots -->
      <circle cx="50" cy="60" r="2" fill="#DDE3EA"/>
      <circle cx="155" cy="60" r="2" fill="#DDE3EA"/>
    </svg>