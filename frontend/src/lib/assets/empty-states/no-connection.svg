      <!-- Small signal waves (broken) -->
      <path d="M82 98 C82 90 88 84 95 84" fill="none" stroke="#C0C8D0" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M108 95 C108 102 102 108 95 108" fill="none" stroke="#C0C8D0" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>

